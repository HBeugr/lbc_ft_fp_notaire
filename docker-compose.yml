# =============================================================================
# Notaire LBC/FT/FP — Stack de production
# -----------------------------------------------------------------------------
# SaaS multi-tenant sur PostgreSQL 16, isolation par SCHÉMA :
#   - schéma `shared`          : annuaire de routage (cabinets, Super-Admins)
#   - schéma `tenant_<uuid>`   : données métier d'UN cabinet notarial
# =============================================================================
services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    # Pas de port hôte en production : l'accès public passe par un domaine
    # HTTPS routé via Traefik sur `dokploy-network` (Dokploy → Domains →
    # service `frontend`, port conteneur 80). Le développement republie
    # 4000:80 via docker-compose.dev.yml, ce qui permet dev + prod sur le
    # même VPS sans collision de ports.
    depends_on:
      api:
        condition: service_healthy
    networks:
      - default
      - dokploy-network
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Aucun port hôte en production : l'API n'est jointe que par le nginx du
    # frontend, en interne (`proxy_pass http://api:8000/api/`). L'exposer
    # publierait /api sans TLS ni frontal. Le développement republie 9000:8000
    # via docker-compose.dev.yml pour le debug local.
    env_file: .env
    environment:
      # Ces deux valeurs sont IMPOSÉES ici plutôt que laissées à la configuration
      # de l'hébergeur, parce qu'une erreur sur l'une ou l'autre est silencieuse
      # et coûteuse :
      #
      #  · APP_ENV=development active l'écho SQL — les requêtes ET LEURS
      #    PARAMÈTRES, donc des données clients, partent dans les journaux — et
      #    expose /api/docs publiquement.
      #  · DB_PORT est le port INTERNE du conteneur PostgreSQL, pas un réglage
      #    de déploiement. Hériter d'un 3306 laissé par l'ère MySQL empêche
      #    simplement l'API de joindre sa base.
      #
      # Le développement local surcharge APP_ENV via docker-compose.dev.yml.
      - APP_ENV=production
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      # Marge volontairement large : l'entrypoint joue les migrations de
      # l'annuaire avant de démarrer uvicorn.
      retries: 10
      start_period: 40s
    restart: unless-stopped

  db:
    build:
      context: ./infra/postgres
      dockerfile: Dockerfile
    env_file: .env
    environment:
      # ⚠️ PostgreSQL n'a pas de compte « root » distinct comme MySQL :
      # le superutilisateur EST POSTGRES_USER. Le compte applicatif
      # (DB_USER) est donc aussi le compte d'administration du cluster —
      # il n'y a plus de MYSQL_ROOT_PASSWORD à définir.
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      # Sous-répertoire imposé : le point de montage lui-même ne doit pas être
      # la racine du datadir (perdu+trouvé, permissions).
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - type: volume
        source: pg_data
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - type: volume
        source: redis_data
        target: /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  storage:
    image: quay.io/minio/minio:latest
    # Aucun port publié en production : le stockage documentaire n'est consommé
    # que par `api`, sur le réseau interne. Le publier sur l'hôte exposerait les
    # pièces d'identité et les actes derrière une simple clé S3, sans aucune
    # nécessité. La console d'administration est ouverte en développement
    # uniquement, via docker-compose.dev.yml (ports 9020/9021).
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - type: volume
        source: minio_data
        target: /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backup:
    build:
      context: ./infra/backup
      dockerfile: Dockerfile
    env_file: .env
    environment:
      # Variables libpq standard, directement comprises par pg_dump et psql.
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${DB_NAME}
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      # Nom du schéma d'annuaire : le script y lit la liste des cabinets à
      # sauvegarder individuellement (shared.tenants.schema_name).
      SHARED_SCHEMA: ${SHARED_SCHEMA:-shared}
      BACKUP_AES_KEY: ${BACKUP_AES_KEY}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - type: volume
        source: backup_data
        target: /backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  # Volume PostgreSQL VOLONTAIREMENT distinct de l'ancien `db_data`, qui porte
  # encore les fichiers MySQL sur les environnements déjà déployés. Réutiliser
  # le même nom ferait cohabiter deux moteurs dans un seul volume : on ne
  # saurait plus ce qu'on sauvegarde ni ce qu'on supprime, et le retrait de
  # l'ancienne base cesserait d'être un geste explicite.
  # `db_data` n'est plus référencé : il se supprime à la main, après bascule
  # vérifiée (cf. docs/BASCULE-POSTGRESQL.md §8).
  pg_data:
  redis_data:
  minio_data:
  backup_data:

networks:
  default:
    driver: bridge
  dokploy-network:
    external: true
