services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "4000:80"
    networks:
      - default

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    ports:
      - "9000:8000"
    environment:
      - APP_ENV=development

  db:
    ports:
      - "3307:3306"

  redis:
    ports:
      - "6389:6379"

  storage:
    ports:
      - "9010:9000"
      - "9011:9001"
